spring:
  application:
    name: alan-dataflow

dataflow:
  worker:
    role: ALL   # ALL | DOWNLOADER | CONVERTER | PROCESSOR | UPLOADER
  simulation:
    ftp-download-delay-ms: 300
    compression-delay-ms: 150
    conversion-delay-ms: 800
    processing-delay-ms: 1200
    upload-delay-ms: 200

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%15.15t] %5p  %msg%n"
  level:
    com.alan.dataflow: DEBUG

---
# K8s converter pod: java -jar dataflow.jar --dataflow.worker.role=CONVERTER
spring.config.activate.on-profile: converter
dataflow.worker.role: CONVERTER

---
# K8s processor pod: java -jar dataflow.jar --dataflow.worker.role=PROCESSOR
spring.config.activate.on-profile: processor
dataflow.worker.role: PROCESSOR

---
# K8s downloader pod
spring.config.activate.on-profile: downloader
dataflow.worker.role: DOWNLOADER

---
# K8s uploader pod
spring.config.activate.on-profile: uploader
dataflow.worker.role: UPLOADER
